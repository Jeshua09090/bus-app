version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      app-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /scripts/snapshot
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      snapshot-dependencies:
        patterns:
          - "*"
