name: Datos de ruta o parada
description: Compartí una corrección de ruta, parada, transbordo u horario.
title: "[Datos de ruta]: "
labels:
  - data
body:
  - type: input
    id: corridor
    attributes:
      label: Ruta o corredor
      placeholder: Cartago centro a Taras, conector de San José, etc.
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: ¿Qué debería cambiar?
      description: Describí la parada, variante, transbordo o problema de horario.
    validations:
      required: true
  - type: textarea
    id: local_reason
    attributes:
      label: ¿Por qué esto es correcto localmente?
      description: Agregá contexto local, fuentes o cómo lo verificaste.
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Viaje de ejemplo
      description: Si afecta el planner, incluí origen, destino y hora aproximada.
