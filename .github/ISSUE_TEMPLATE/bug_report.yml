name: Reporte de bug
description: Reportá algo roto o confuso en la app.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: ¿Qué pasó?
      description: Contá qué viste y qué esperabas que pasara.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Incluí pantalla, ruta, búsqueda o comando usado.
      placeholder: |
        1. Abrí...
        2. Busqué...
        3. Vi...
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Plataforma
      placeholder: Android, iOS, web o script local
  - type: textarea
    id: context
    attributes:
      label: Contexto extra
      description: Logs, capturas, nombres de ruta o cualquier detalle útil.
